events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Upstream definitions
    upstream web {
        server web:3000;
    }

    upstream strapi {
        server strapi:1337;
    }

    upstream ai {
        server ai-service:8000;
    }

    upstream mebbis {
        server mebbis-service:4000;
    }

    server {
        listen 80;
        server_name localhost;

        # Frontend (Web)
        location / {
            proxy_pass http://web;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Strapi CMS
        location /api/cms/ {
            # Rewrite path if needed, depending on Strapi config
            # But Strapi usually handles prefix. If Strapi is expecting /admin or /api, we should be careful with rewriting.
            # Assuming Strapi is served at root, we might need rewrite.
            # Best practice: Keep path consistent or use subdomain.
            # For now, let's proxy directly and assume client handles paths or update Strapi config if broken.
            # Actually, Strapi usually lives under /admin or /api.
            # Let's map /admin and /api separately or use a cleaner robust regex.
            
            rewrite ^/api/cms/(.*) /$1 break;
            proxy_pass http://strapi;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # AI Service
        location /api/ai/ {
            rewrite ^/api/ai/(.*) /$1 break;
            proxy_pass http://ai;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # MEBBIS Service
        location /api/mebbis/ {
            rewrite ^/api/mebbis/(.*) /$1 break;
            proxy_pass http://mebbis;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # MEBBIS Queue Dashboard
        location /admin/queues/ {
            proxy_pass http://mebbis/admin/queues/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
        }
    }
}
