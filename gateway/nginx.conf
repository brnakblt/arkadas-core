events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Upstream definitions
    upstream web {
        server web:3000;
    }

    upstream strapi {
        server strapi:1337;
    }

    server {
        listen 80;
        server_name localhost;

        # Frontend (Web)
        location / {
            # Security Headers
            add_header X-Frame-Options "SAMEORIGIN";
            add_header X-Content-Type-Options "nosniff";
            add_header Referrer-Policy "strict-origin-when-cross-origin";
            add_header X-XSS-Protection "1; mode=block";
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

            proxy_pass http://web;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Strapi CMS
        location /api/cms/ {
            # Rewrite path if needed, depending on Strapi config
            # But Strapi usually handles prefix. If Strapi is expecting /admin or /api, we should be careful with rewriting.
            # Assuming Strapi is served at root, we might need rewrite.
            # Best practice: Keep path consistent or use subdomain.
            # For now, let's proxy directly and assume client handles paths or update Strapi config if broken.
            # Actually, Strapi usually lives under /admin or /api.
            # Let's map /admin and /api separately or use a cleaner robust regex.
            
            rewrite ^/api/cms/(.*) /$1 break;
            proxy_pass http://strapi;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
