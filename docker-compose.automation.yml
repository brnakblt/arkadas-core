version: '3.8'

x-chatwoot-common: &chatwoot-common
  image: chatwoot/chatwoot:latest
  restart: unless-stopped
  env_file: .env
  environment:
    - FRONTEND_URL=http://localhost:3002
    - POSTGRES_DATABASE=chatwoot
    - POSTGRES_HOST=postgres
    - POSTGRES_USERNAME=${POSTGRES_USER}
    - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    - NODE_ENV=production
    - RAILS_ENV=production
    - INSTALLATION_ENV=docker
    - SECRET_KEY_BASE=${CHATWOOT_SECRET_KEY_BASE:-replace_me_with_a_long_random_string}
  depends_on:
    - postgres
    - redis

services:
  # ==========================================
  # n8n - Workflow Automation
  # ==========================================
  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=${DOMAIN_NAME:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://${DOMAIN_NAME:-localhost}:5678/
      - GENERIC_TIMEZONE=${TIMEZONE:-Europe/Istanbul}
    volumes:
      - n8n_data:/home/node/.n8n
    deploy:
      resources:
        limits:
          memory: 512M

  # ==========================================
  # Chatwoot - messaging platform
  # ==========================================

  # Base service to run migration
  chatwoot_base:
    <<: *chatwoot-common
    entrypoint: "/bin/sh -c 'bundle exec rails db:chatwoot_prepare && ./bin/rails server -b 0.0.0.0 -p 3000'"
    ports:
      - "3002:3000"
    volumes:
      - chatwoot_data:/app/storage
    deploy:
      resources:
        limits:
          memory: 1G

  chatwoot_worker:
    <<: *chatwoot-common
    command: bundle exec sidekiq -C config/sidekiq.yml
    volumes:
      - chatwoot_data:/app/storage
    deploy:
      resources:
        limits:
          memory: 1G

volumes:
  n8n_data:
  chatwoot_data:


networks:
  default:
    name: arkadasozelegitim_default
    external: true
