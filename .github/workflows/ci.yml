name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: arkadas_erp
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Dependencies
        run: |
          npm ci --legacy-peer-deps
          
          # AI Service
          cd ai-service
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt
          cd ..
          
          # Docs
          pip install mkdocs-material mkdocs

      - name: Run Web Tests
        run: npm run test:web
        env:
          CI: true

      - name: Run Strapi Build Check
        run: |
          cd strapi
          npm run build
        env:
          CI: true
          DATABASE_CLIENT: postgres
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_NAME: arkadas_erp
          DATABASE_USERNAME: postgres
          DATABASE_PASSWORD: postgres

      - name: Run Mebbis Tests
        run: npm run test:mebbis
        env:
          CI: true

      - name: Run AI Tests
        run: npm run test:ai
        env:
          CI: true

      - name: Build Docs
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          cd docs && mkdocs build --strict

  e2e:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run E2E Tests
        run: npm run test:e2e
        env:
          CI: true
      - name: Slack Notification
        uses: rtCamp/action-slack-notify@v2
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_COLOR: ${{ job.status }}
          SLACK_TITLE: CI Status
          SLACK_MESSAGE: 'CI job finished with status: ${{ job.status }}'
          SLACK_USERNAME: GitHub Actions
