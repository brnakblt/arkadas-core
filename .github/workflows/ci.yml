name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x]
        python-version: [3.11]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: '**/package-lock.json'

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install Dependencies
      run: |
        # Web
        cd web && npm ci && cd ..
        
        # Mebbis Service
        cd mebbis-service && npm ci && cd ..
        
        # AI Service
        cd ai-service
        python -m venv venv
        source venv/bin/activate
        pip install -r requirements.txt
        # Install dlib fallback or use cache if possible, for now basic install
        cd ..

    - name: Run Tests
      run: |
        # Make script executable
        chmod +x scripts/run-tests.sh
        
        # Run script
        ./scripts/run-tests.sh
      env:
        CI: true

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Images
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./strapi/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/strapi:latest
          # Add other services here similarly using matrix or separate steps if contexts differ
          
      - name: Deploy to Production
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "Login to GHCR..."
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            echo "Pulling latest images..."
            docker pull ghcr.io/${{ github.repository }}/strapi:latest
            
            echo "Restarting services..."
            # Assuming docker-compose.prod.yml is present
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d strapi
