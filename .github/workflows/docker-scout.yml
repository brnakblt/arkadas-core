name: Docker Scout Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  STRAPI_IMAGE: ${{ github.repository }}/strapi
  WEB_IMAGE: ${{ github.repository }}/web

jobs:
  scout-scan:
    name: Docker Scout CVE Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build Strapi Image
      - name: Build Strapi Image
        uses: docker/build-push-action@v5
        with:
          context: ./strapi
          push: false
          load: true
          tags: ${{ env.STRAPI_IMAGE }}:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build Web Image
      - name: Build Web Image
        uses: docker/build-push-action@v5
        with:
          context: ./web
          push: false
          load: true
          tags: ${{ env.WEB_IMAGE }}:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Scout Scan - Strapi
      - name: Scout Scan Strapi
        uses: docker/scout-action@v1
        with:
          command: cves,recommendations
          image: ${{ env.STRAPI_IMAGE }}:scan
          only-severities: critical,high
          sarif-file: strapi-scout.sarif
          summary: true
        continue-on-error: true

      # Scout Scan - Web
      - name: Scout Scan Web
        uses: docker/scout-action@v1
        with:
          command: cves,recommendations
          image: ${{ env.WEB_IMAGE }}:scan
          only-severities: critical,high
          sarif-file: web-scout.sarif
          summary: true
        continue-on-error: true

      # Upload SARIF for GitHub Security tab
      - name: Upload Strapi SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: hashFiles('strapi-scout.sarif') != ''
        with:
          sarif_file: strapi-scout.sarif
          category: strapi-security

      - name: Upload Web SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: hashFiles('web-scout.sarif') != ''
        with:
          sarif_file: web-scout.sarif
          category: web-security

      # Compare with base (only on PRs)
      - name: Scout Compare (Strapi)
        if: github.event_name == 'pull_request'
        uses: docker/scout-action@v1
        with:
          command: compare
          image: ${{ env.STRAPI_IMAGE }}:scan
          to: ${{ env.STRAPI_IMAGE }}:latest
          only-severities: critical,high
          exit-code: false
          summary: true

      - name: Scout Compare (Web)
        if: github.event_name == 'pull_request'
        uses: docker/scout-action@v1
        with:
          command: compare
          image: ${{ env.WEB_IMAGE }}:scan
          to: ${{ env.WEB_IMAGE }}:latest
          only-severities: critical,high
          exit-code: false
          summary: true
      - name: Slack Notification
        if: always()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_COLOR: ${{ job.status }}
          SLACK_TITLE: Security Scan Status
          SLACK_MESSAGE: 'Docker Scout scan finished with status: ${{ job.status }}'
          SLACK_USERNAME: GitHub Actions
