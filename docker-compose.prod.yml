version: '3.8'

services:
  # ==========================================
  # Shared Infrastructure (Consolidated)
  # ==========================================
  postgres:
    profiles: [ core ]
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-arkadas_erp}
      # Otomatik olarak nextcloud ve onlyoffice veritabanlarini olustur
      POSTGRES_MULTIPLE_DATABASES: nextcloud,onlyoffice
    volumes:
      - ./databases/postgres:/var/lib/postgresql/data
      - ./databases/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - arkadas-net
    deploy:
      resources:
        limits:
          memory: 1G # Tek bir instance tüm yükü kaldırır
          cpus: '1.0'
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    profiles: [ core ]
    image: redis:7-alpine
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - ./databases/redis:/data
    networks:
      - arkadas-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # Infrastructure Apps (Optimized)
  # ==========================================
  onlyoffice:
    profiles: [ infra ]
    image: onlyoffice/documentserver:latest
    restart: always
    ports:
      - "8081:80"
    environment:
      - JWT_ENABLED=true
      - JWT_SECRET=${JWT_SECRET:-changeme}
      # Use Shared DB
      - DB_TYPE=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=onlyoffice
      - DB_USER=onlyoffice
      - DB_PWD=onlyoffice
      # Use Shared Redis
      - REDIS_SERVER_HOST=redis
      - REDIS_SERVER_PORT=6379
    volumes:
      - ./databases/onlyoffice/data:/var/www/onlyoffice/Data
      - ./databases/onlyoffice/log:/var/log/onlyoffice
      # Lib volume'unu kaldirdik cunku icindeki DB'yi kullanmiyoruz artik
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - arkadas-net
    deploy:
      resources:
        limits:
          memory: 1.5G # External DB sayesinde 2G'den dustu
          cpus: '1.0'

  nextcloud:
    profiles: [ infra ]
    image: nextcloud:apache
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./databases/nextcloud:/var/www/html
    environment:
      # Use Shared DB (Postgres) instead of MariaDB
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=nextcloud
      - POSTGRES_PASSWORD=nextcloud
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER:-admin}
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD:-admin}
      - NEXTCLOUD_TRUSTED_DOMAINS=localhost
      - REDIS_HOST=redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - arkadas-net
    deploy:
      resources:
        limits:
          memory: 768M # Optimize edildi
          cpus: '1.0'

  n8n:
    profiles: [ infra ]
    image: n8nio/n8n:latest
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Europe/Istanbul
      # n8n varsayilan olarak SQLite kullanir, hafif kullanim icin yeterlidir.
      # Yuk artarsa Postgres'e gecirilebilir.
    volumes:
      - ./databases/n8n:/home/node/.n8n
    networks:
      - arkadas-net
    deploy:
      resources:
        limits:
          memory: 512M # Limitlendi
          cpus: '0.5'

  dozzle:
    profiles: [ infra ]
    image: amir20/dozzle:latest
    restart: always
    ports:
      - "8888:8080"
    environment:
      DOZZLE_LEVEL: info
      DOZZLE_TAIL: 100
      # Basic Auth (Optional but recommended for prod)
      DOZZLE_USERNAME: ${DOZZLE_USERNAME:-admin}
      DOZZLE_PASSWORD: ${DOZZLE_PASSWORD:-admin}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - arkadas-net
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'

  uptime-kuma:
    profiles: [ infra ]
    image: louislam/uptime-kuma:1
    restart: always
    ports:
      - "3001:3001"
    volumes:
      - ./databases/uptime-kuma:/app/data
    networks:
      - arkadas-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  # ==========================================
  # Application Services
  # ==========================================
  strapi:
    profiles: [ apps ]
    build:
      context: ./strapi
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-arkadas_erp}
      DATABASE_USERNAME: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      HOST: 0.0.0.0
      PORT: 1337
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-changeme}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-changeme}
      APP_KEYS: ${APP_KEYS:-changeme,changeme}
      API_TOKEN_SALT: ${API_TOKEN_SALT:-changeme}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT:-changeme}
    volumes:
      - ./strapi/public/uploads:/opt/app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - arkadas-net
    ports:
      - "1337:1337"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  web:
    profiles: [ apps ]
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: always
    environment:
      NEXT_PUBLIC_STRAPI_URL: http://localhost:1337
      NEXT_PUBLIC_AI_SERVICE_URL: http://localhost:8000
      NEXT_PUBLIC_MEBBIS_SERVICE_URL: http://localhost:4000
      NODE_ENV: production
    networks:
      - arkadas-net
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    depends_on:
      - strapi

  ai-service:
    profiles: [ features ]
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-arkadas_erp}
      STRAPI_URL: http://strapi:1337
      HOST: 0.0.0.0
      PORT: 8000
    volumes:
      - ./ai-service/data:/app/data
    networks:
      - arkadas-net
    ports:
      - "8000:8000"
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: '1.0'
    depends_on:
      postgres:
        condition: service_healthy

  mebbis-service:
    profiles: [ features ]
    build:
      context: ./mebbis-service
      dockerfile: Dockerfile
    restart: always
    environment:
      STRAPI_URL: http://strapi:1337
      REDIS_URL: redis://redis:6379
      PORT: 4000
      MEBBIS_USERNAME: ${MEBBIS_USERNAME}
      MEBBIS_PASSWORD: ${MEBBIS_PASSWORD}
    networks:
      - arkadas-net
    ports:
      - "4000:4000"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
    depends_on:
      redis:
        condition: service_healthy

networks:
  arkadas-net:
    driver: bridge
