version: "3.9"

services:
  # ==========================================
  # DATABASE LAYER
  # ==========================================
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-arkadas_erp}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-arkadas_erp}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # BACKEND LAYER (Strapi)
  # ==========================================
  strapi:
    build:
      context: ./strapi
      dockerfile: Dockerfile
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-arkadas_erp}
      DATABASE_USERNAME: ${POSTGRES_USER:-postgres}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      APP_KEYS: ${APP_KEYS}
      API_TOKEN_SALT: ${API_TOKEN_SALT}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT}
    volumes:
      - ./strapi/public/uploads:/opt/app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ==========================================
  # AI SERVICE (Python)
  # ==========================================
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-arkadas_erp}
      STRAPI_URL: http://strapi:1337
      AI_SERVICE_API_KEY: ${AI_SERVICE_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy

  # ==========================================
  # MEBBIS SERVICE
  # ==========================================
  mebbis-service:
    build:
      context: ./mebbis-service
      dockerfile: Dockerfile
    restart: always
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      STRAPI_URL: http://strapi:1337
      MEBBIS_SERVICE_API_KEY: ${MEBBIS_SERVICE_API_KEY}
    depends_on:
      redis:
        condition: service_healthy

  # ==========================================
  # FRONTEND LAYER (Next.js)
  # ==========================================
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: always
    environment:
      NEXT_PUBLIC_STRAPI_URL: ${NEXT_PUBLIC_STRAPI_URL}
      NEXT_PUBLIC_AI_SERVICE_URL: http://ai-service:8000
      NEXT_PUBLIC_MEBBIS_SERVICE_URL: http://mebbis-service:4000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
    depends_on:
      - strapi

  # ==========================================
  # UTILITY LAYER
  # ==========================================
  onlyoffice:
    image: onlyoffice/documentserver:latest
    restart: always
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_log:/var/log/onlyoffice

  sftpgo:
    image: drakkan/sftpgo:latest
    restart: always
    environment:
      SFTPGO_DEFAULT_ADMIN_USERNAME: ${SFTPGO_ADMIN_USER:-admin}
      SFTPGO_DEFAULT_ADMIN_PASSWORD: ${SFTPGO_ADMIN_PASSWORD:-changeme}
      SFTPGO_DATA_PROVIDER__DRIVER: sqlite
      SFTPGO_DATA_PROVIDER__NAME: /var/lib/sftpgo/sftpgo.db
    volumes:
      - ./databases/sftpgo/data:/srv/sftpgo/data
      - ./databases/sftpgo/config:/var/lib/sftpgo

volumes:
  postgres_data:
  redis_data:
  onlyoffice_data:
  onlyoffice_log:
