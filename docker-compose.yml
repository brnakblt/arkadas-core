# Minimal Docker Compose - Core Infrastructure Only
# Apps (Web, Strapi, AI, Mebbis) run natively for faster development

# ==========================================
# PORT ALLOCATION (Conflict-Free)
# ==========================================
# PostgreSQL:     5432
# Redis:          6380
# Web (Next.js):  3000
# Strapi CMS:     1337
# Docs (MkDocs):  8001
# Collabora:      9980
# SFTPGo Admin:   8088
# SFTPGo WebDAV:  8089
# ==========================================

services:
  # ==========================================
  # Core Infrastructure (Always Required)
  # ==========================================
  postgres:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./infra_data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    restart: always
    command: >
      redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --appendfsync everysec --maxmemory 256mb --maxmemory-policy noeviction --loglevel warning
    volumes:
      - ./infra_data/redis:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  # ==========================================
  # SFTPGo - File Storage & WebDAV
  # ==========================================
  sftpgo:
    image: drakkan/sftpgo:v2.7
    restart: unless-stopped
    ports:
      - "8088:8080" # WebAdmin/API
      - "8089:8089" # WebDAV
    environment:
      SFTPGO_HTTPD__BINDINGS__0__PORT: 8080
      SFTPGO_HTTPD__BINDINGS__0__ENABLE_WEB_ADMIN: "true"
      SFTPGO_HTTPD__BINDINGS__0__ENABLE_REST_API: "true"
      SFTPGO_WEBDAVD__BINDINGS__0__PORT: 8089
      SFTPGO_DATA_PROVIDER__DRIVER: sqlite
      SFTPGO_DATA_PROVIDER__NAME: /var/lib/sftpgo/sftpgo.db
      SFTPGO_DATA_PROVIDER__CREATE_DEFAULT_ADMIN: "true"
      SFTPGO_DEFAULT_ADMIN_USERNAME: ${SFTPGO_ADMIN_USER}
      SFTPGO_DEFAULT_ADMIN_PASSWORD: ${SFTPGO_ADMIN_PASSWORD}
    volumes:
      - ./infra_data/sftpgo/data:/srv/sftpgo/data
      - ./infra_data/sftpgo/config:/var/lib/sftpgo
    deploy:
      resources:
        limits:
          memory: 128M

  # ==========================================
  # Application Services
  # ==========================================

  # ==========================================
  # Collabora Online - Document Editing (MPL-2.0)
  # ==========================================
  collabora:
    image: collabora/code:latest
    restart: unless-stopped
    ports:
      - "9980:9980"
    environment:
      aliasgroup1: "http://localhost:3000,http://web:3000,http://strapi:1337"
      username: admin
      password: ${COLLABORA_ADMIN_PASSWORD:-collabora}
      extra_params: "--o:ssl.enable=false --o:ssl.termination=false"
      dictionaries: "tr en"
    cap_add:
      - MKNOD
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:9980/hosting/capabilities || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G

  strapi:
    build:
      context: ./strapi
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "1337:1337"
    environment:
      - DATABASE_CLIENT=postgres
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=${POSTGRES_DB}
      - DATABASE_USERNAME=${POSTGRES_USER}
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD}
      - DATABASE_SSL=false
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET}
      - APP_KEYS=${APP_KEYS}
      - API_TOKEN_SALT=${API_TOKEN_SALT}
      - TRANSFER_TOKEN_SALT=${TRANSFER_TOKEN_SALT}
      - SFTPGO_URL=http://sftpgo:8080
      - SFTPGO_ADMIN_USERNAME=${SFTPGO_ADMIN_USER}
      - SFTPGO_ADMIN_PASSWORD=${SFTPGO_ADMIN_PASSWORD}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    volumes:
      - ./strapi/public/uploads:/opt/app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      sftpgo:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 1G

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_STRAPI_URL=http://localhost:1337
      - STRAPI_URL=http://strapi:1337
    depends_on:
      - strapi
    deploy:
      resources:
        limits:
          memory: 512M

  ai-service:
    image: python:3.11-slim
    restart: unless-stopped
    command: ["python", "-m", "http.server", "8000"]
    ports:
      - "8000:8000"
    volumes:
      - ./api/opencv:/app
    deploy:
      resources:
        limits:
          memory: 512M

  mebbis:
    image: node:24.14.0-alpine
    restart: unless-stopped
    command: ["node", "-e", "console.log('Mebbis service starting on port 4000...'); require('http').createServer((req,res)=>res.end('MEBBIS Mock')).listen(4000);"]
    ports:
      - "4000:4000"
    deploy:
      resources:
        limits:
          memory: 256M
