# Minimal Docker Compose - Core Infrastructure Only
# Apps (Web, Strapi, AI, Mebbis) run natively for faster development

# ==========================================
# PORT ALLOCATION (Conflict-Free)
# ==========================================
# PostgreSQL:     5432
# Redis:          6380
# Web (Next.js):  3000
# Strapi CMS:     1337
# Mebbis Service: 4000
# AI Service:     8000
# Docs (MkDocs):  8001
# OnlyOffice:     8080
# SFTPGo Admin:   8088
# SFTPGo WebDAV:  8089
# Mobile (Expo):  8085
# ==========================================

services:
  # ==========================================
  # Core Infrastructure (Always Required)
  # ==========================================
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-arkadas_erp}
    volumes:
      - ./databases/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server --requirepass ${REDIS_PASSWORD:-changeme} --appendonly yes --appendfsync everysec --maxmemory 256mb --maxmemory-policy noeviction --loglevel warning
    volumes:
      - ./databases/redis:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  onlyoffice:
    image: onlyoffice/documentserver:latest
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: ${JWT_SECRET:-secret}
      JWT_HEADER: "Authorization"
      JWT_IN_BODY: "true"
    volumes:
      - ./databases/onlyoffice/data:/var/www/onlyoffice/Data
      - ./databases/onlyoffice/log:/var/log/onlyoffice
      - ./databases/onlyoffice/cache:/var/lib/onlyoffice/documentserver/App_Data/cache/files
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost/healthcheck" ]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G

  # ==========================================
  # SFTPGo - File Storage & WebDAV
  # ==========================================
  sftpgo:
    image: drakkan/sftpgo:latest
    restart: unless-stopped
    ports:
      - "8088:8080" # WebAdmin/API
      - "8089:8089" # WebDAV
    environment:
      SFTPGO_HTTPD__BINDINGS__0__PORT: 8080
      SFTPGO_HTTPD__BINDINGS__0__ENABLE_WEB_ADMIN: "true"
      SFTPGO_HTTPD__BINDINGS__0__ENABLE_REST_API: "true"
      SFTPGO_WEBDAVD__BINDINGS__0__PORT: 8089
      SFTPGO_DATA_PROVIDER__DRIVER: sqlite
      SFTPGO_DATA_PROVIDER__NAME: /var/lib/sftpgo/sftpgo.db
      SFTPGO_DEFAULT_ADMIN_USERNAME: ${SFTPGO_ADMIN_USER:-admin}
      SFTPGO_DEFAULT_ADMIN_PASSWORD: ${SFTPGO_ADMIN_PASSWORD:-changeme}
    volumes:
      - ./databases/sftpgo/data:/srv/sftpgo/data
      - ./databases/sftpgo/config:/var/lib/sftpgo
    deploy:
      resources:
        limits:
          memory: 128M
