# Minimal Docker Compose - Core Infrastructure Only (arkadas-core)
# All client apps (Web, Mobile) are now in separate repositories

# ==========================================
# PORT ALLOCATION (Conflict-Free)
# ==========================================
# PostgreSQL:     5432
# Redis:          6380
# Strapi CMS:     1337
# AI Service:     8000
# Mebbis Mock:    4000
# Nextcloud:      8088
# ==========================================

services:
  # ==========================================
  # Core Infrastructure
  # ==========================================
  postgres:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./infra_data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    restart: always
    command: >
      redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --appendfsync everysec --maxmemory 256mb --maxmemory-policy noeviction --loglevel warning
    volumes:
      - ./infra_data/redis:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  # ==========================================
  # Nextcloud - File Storage
  # ==========================================
  nextcloud:
    image: nextcloud:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8088:80"
    volumes:
      - ./infra_data/nextcloud/data:/var/www/html
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER}
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD}
      - NEXTCLOUD_TRUSTED_DOMAINS=localhost nextcloud.arkadas.com.tr
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/status.php"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  # ==========================================
  # Core Application Services
  # ==========================================
  strapi:
    build:
      context: ./strapi
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "1337:1337"
    environment:
      - DATABASE_CLIENT=postgres
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=${POSTGRES_DB}
      - DATABASE_USERNAME=${POSTGRES_USER}
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD}
      - DATABASE_SSL=false
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET}
      - APP_KEYS=${APP_KEYS}
      - API_TOKEN_SALT=${API_TOKEN_SALT}
      - TRANSFER_TOKEN_SALT=${TRANSFER_TOKEN_SALT}
      - NEXTCLOUD_URL=http://nextcloud:80
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER}
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    volumes:
      - ./strapi/public/uploads:/opt/app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nextcloud:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G

  ai-service:
    image: python:3.11-slim
    restart: unless-stopped
    command: ["python", "-m", "http.server", "8000"]
    ports:
      - "8000:8000"
    volumes:
      - ./api/opencv:/app
    deploy:
      resources:
        limits:
          memory: 512M

  mebbis:
    image: node:24.14.0-alpine
    restart: unless-stopped
    command: ["node", "-e", "console.log('Mebbis service starting on port 4000...'); require('http').createServer((req,res)=>res.end('MEBBIS Mock')).listen(4000);"]
    ports:
      - "4000:4000"
    deploy:
      resources:
        limits:
          memory: 256M
