# Minimal Docker Compose - Core Infrastructure Only
# Apps (Web, Strapi, AI, Mebbis) run natively for faster development

services:
  # ==========================================
  # Core Infrastructure (Always Required)
  # ==========================================
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-arkadas_erp}
    volumes:
      - ./databases/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - ./databases/redis:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M

  # ==========================================
  # Optional: SFTPGo for file storage
  # ==========================================
  sftpgo:
    profiles: [ storage ]
    image: drakkan/sftpgo:latest
    restart: unless-stopped
    ports:
      - "8082:8080" # WebAdmin/API
      - "8090:8090" # WebDAV
    environment:
      SFTPGO_HTTPD__BINDINGS__0__PORT: 8080
      SFTPGO_HTTPD__BINDINGS__0__ENABLE_WEB_ADMIN: "true"
      SFTPGO_HTTPD__BINDINGS__0__ENABLE_REST_API: "true"
      SFTPGO_WEBDAVD__BINDINGS__0__PORT: 8090
      SFTPGO_DATA_PROVIDER__DRIVER: sqlite
      SFTPGO_DATA_PROVIDER__NAME: /var/lib/sftpgo/sftpgo.db
      SFTPGO_DEFAULT_ADMIN_USERNAME: ${SFTPGO_ADMIN_USER:-admin}
      SFTPGO_DEFAULT_ADMIN_PASSWORD: ${SFTPGO_ADMIN_PASSWORD:-changeme}
    volumes:
      - ./databases/sftpgo/data:/srv/sftpgo/data
      - ./databases/sftpgo/config:/var/lib/sftpgo
    deploy:
      resources:
        limits:
          memory: 128M
