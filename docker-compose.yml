# Minimal Docker Compose - Core Infrastructure Only
# Apps (Web, Strapi, AI, Mebbis) run natively for faster development

# ==========================================
# PORT ALLOCATION (Conflict-Free)
# ==========================================
# PostgreSQL:     5432
# Redis:          6380
# Web (Next.js):  3000
# Strapi CMS:     1337
# Mebbis Service: 4000
# AI Service:     8000
# Docs (MkDocs):  8001
# OnlyOffice:     8080
# SFTPGo Admin:   8088
# SFTPGo WebDAV:  8089
# Mobile (Expo):  8085
# ==========================================

services:
  # ==========================================
  # Core Infrastructure (Always Required)
  # ==========================================
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-arkadas_erp}
    volumes:
      - ./databases/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server --requirepass ${REDIS_PASSWORD:-changeme} --appendonly yes --appendfsync everysec --maxmemory 256mb --maxmemory-policy noeviction --loglevel warning
    volumes:
      - ./databases/redis:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  # ==========================================
  # SFTPGo - File Storage & WebDAV
  # ==========================================
  sftpgo:
    image: drakkan/sftpgo:latest
    restart: unless-stopped
    ports:
      - "8088:8080" # WebAdmin/API
      - "8089:8089" # WebDAV
    environment:
      SFTPGO_HTTPD__BINDINGS__0__PORT: 8080
      SFTPGO_HTTPD__BINDINGS__0__ENABLE_WEB_ADMIN: "true"
      SFTPGO_HTTPD__BINDINGS__0__ENABLE_REST_API: "true"
      SFTPGO_WEBDAVD__BINDINGS__0__PORT: 8089
      SFTPGO_DATA_PROVIDER__DRIVER: sqlite
      SFTPGO_DATA_PROVIDER__NAME: /var/lib/sftpgo/sftpgo.db
      SFTPGO_DEFAULT_ADMIN_CONFIG__USERNAME: ${SFTPGO_ADMIN_USER:-admin}
      SFTPGO_DEFAULT_ADMIN_CONFIG__PASSWORD: ${SFTPGO_ADMIN_PASSWORD:-changeme}
      SFTPGO_LOADDATA_FROM: /var/lib/sftpgo/initial_admin.json
      SFTPGO_LOADDATA_QUOTA_SCAN: 0
    volumes:
      - ./databases/sftpgo/data:/srv/sftpgo/data
      - ./databases/sftpgo/config:/var/lib/sftpgo
    deploy:
      resources:
        limits:
          memory: 128M

  # ==========================================
  # Application Services
  # ==========================================

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    image: arkadas-ai-service:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme}
      - API_KEY=${AI_SERVICE_API_KEY:-s3cr3t}
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          memory: 1G

  mebbis-service:
    build:
      context: ./mebbis-service
      dockerfile: Dockerfile
    image: arkadas-mebbis-service:latest
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme}
      - INFISICAL_TOKEN=${INFISICAL_TOKEN}
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          memory: 1G

  strapi:
    build:
      context: ./strapi
      dockerfile: Dockerfile
    image: arkadas-strapi:latest
    restart: unless-stopped
    ports:
      - "1337:1337"
    environment:
      - DATABASE_CLIENT=postgres
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=${POSTGRES_DB:-arkadas_erp}
      - DATABASE_USERNAME=${POSTGRES_USER:-postgres}
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - DATABASE_SSL=false
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-changeme}
      - JWT_SECRET=${JWT_SECRET:-changeme}
      - ADMIN_JWT_SECRET=${ADMIN_JWT_SECRET:-changeme}
      - APP_KEYS=${APP_KEYS:-changeme,changeme,changeme,changeme}
      - API_TOKEN_SALT=${API_TOKEN_SALT:-changeme}
      - TRANSFER_TOKEN_SALT=${TRANSFER_TOKEN_SALT:-changeme}
      - SFTPGO_URL=http://sftpgo:8080
      - SFTPGO_ADMIN_USERNAME=${SFTPGO_ADMIN_USER:-admin}
      - SFTPGO_ADMIN_PASSWORD=${SFTPGO_ADMIN_PASSWORD:-changeme}
    volumes:
      - ./strapi/public/uploads:/opt/app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      sftpgo:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 1G

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: arkadas-web:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_STRAPI_URL=http://localhost:1337
      - STRAPI_URL=http://strapi:1337
      - NEXT_PUBLIC_AI_API_URL=http://localhost:8000
      - AI_API_URL=http://ai-service:8000
    depends_on:
      - strapi
    deploy:
      resources:
        limits:
          memory: 512M
