global:
  checkNewVersion: true
  sendAnonymousUsage: false

# Entry Points
entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https

  websecure:
    address: ":443"

  # SFTPGo Admin
  sftpgo-admin:
    address: ":8088"

# Providers
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: "arkadasozelegitim_default"

  file:
    directory: "/etc/traefik/dynamic"
    watch: true

# API & Dashboard
api:
  dashboard: true
  insecure: true # Disable in production!

# Logs
log:
  level: INFO

accessLog: {}

# Certificates
certificatesResolvers:
  le:
    acme:
      email: "admin@arkadas.com.tr"
      storage: "/acme.json"
      httpChallenge:
        entryPoint: web
